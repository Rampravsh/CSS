<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            height: 500px;
            width: 500px;
            background-color: palevioletred;
            border: 2px solid black;
            border-radius: 10px;
            padding: 10px;
        }
        .box{
            height: 100px;
            width: 100px;
            background-color: aqua;
            border: 2px solid black;
            margin: 10px;
            border-radius: 10px;
            text-align: center;
            padding: 10px;
            float: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="box1" class="box">box1</div>
        <div id="box2" class="box">box2</div>
    </div>
</body>
</html>
